<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Molduk Mission Control</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#e0e0e0;font-family:'Courier New',monospace;padding:10px;max-width:620px;margin:0 auto}
h1{color:#ff3333;font-size:1.4em;letter-spacing:4px;margin-bottom:2px}
.live{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:0.65em;color:#333}
.dot{width:7px;height:7px;background:#00ff88;border-radius:50%;animation:p 1.5s infinite}
@keyframes p{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.4)}50%{box-shadow:0 0 0 5px rgba(0,255,136,0)}}
.hero{background:linear-gradient(135deg,#0a1a0a,#111);border:1px solid #1a3a1a;border-radius:10px;padding:14px;margin-bottom:8px;text-align:center}
.hero-sol{font-size:2.8em;font-weight:bold;color:#00ff88;letter-spacing:2px}
.hero-sub{font-size:0.65em;color:#444;margin-top:2px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.stat{background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:8px;text-align:center}
.stat-lbl{font-size:0.52em;color:#333;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}
.stat-val{font-size:1.1em;font-weight:bold}
.g{color:#00ff88}.r{color:#ff4444}.y{color:#ffaa00}.b{color:#4488ff}.gy{color:#444}
.sec{background:#0e0e0e;border:1px solid #161616;border-radius:8px;padding:10px;margin-bottom:8px}
.sec-h{font-size:0.55em;color:#2a2a2a;text-transform:uppercase;letter-spacing:3px;margin-bottom:8px;display:flex;justify-content:space-between;padding-bottom:5px;border-bottom:1px solid #141414}
.pos{padding:7px 0;border-bottom:1px solid #111;font-size:0.7em}
.pos:last-child{border:none}
.sym{font-weight:bold;font-size:1.05em}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.tag{padding:1px 6px;border-radius:3px;font-size:0.65em;background:#161616}
.tag.g{color:#00ff88;background:#0a150a}
.tag.r{color:#ff4444;background:#150a0a}
.tag.y{color:#ffaa00;background:#15130a}
.tag.b{color:#4488ff;background:#0a0f15}
.tag.mb{color:#aa88ff;background:#110a15}
.wallet-table{width:100%;border-collapse:collapse;font-size:0.62em}
.wallet-table td{padding:4px 6px;border-bottom:1px solid #111}
.wallet-table td:first-child{color:#333;width:35%}
.addr{font-size:0.85em;color:#222;word-break:break-all}
.age-bar{height:3px;background:#1a1a1a;border-radius:2px;margin-top:4px;overflow:hidden}
.age-fill{height:100%;background:#00ff88;border-radius:2px;transition:width 0.5s}
</style>
</head>
<body>
<h1>👑 MOLDUK</h1>
<div class="live">
  <span class="dot"></span>
  <span id="ts">–</span>
  <span style="margin-left:auto;font-size:0.9em" id="updated">–</span>
</div>

<div class="hero">
  <div class="hero-sub">SOL BALANCE</div>
  <div class="hero-sol" id="sol">loading…</div>
  <div class="hero-sub" style="margin-top:4px">
    <span id="usdc" class="y">–</span> USDC.e &nbsp;·&nbsp;
    <span class="gy">4imFZ38D…grWf</span>
  </div>
</div>

<div class="g4">
  <div class="stat"><div class="stat-lbl">Positions</div><div class="stat-val b" id="pos-cnt">–</div></div>
  <div class="stat"><div class="stat-lbl">Bought</div><div class="stat-val y" id="bought">–</div></div>
  <div class="stat"><div class="stat-lbl">Sold</div><div class="stat-val" id="sold">–</div></div>
  <div class="stat"><div class="stat-lbl">PnL</div><div class="stat-val" id="pnl">–</div></div>
</div>

<div class="sec">
  <div class="sec-h"><span>🎯 Open Positions</span><span class="gy" id="pos-time">–</span></div>
  <div id="pos-list"><div class="gy" style="font-size:0.72em;padding:8px 0">Loading…</div></div>
</div>

<div class="sec">
  <div class="sec-h"><span>📊 Recent Trades</span><span class="gy" id="trade-cnt">–</span></div>
  <div id="trade-list"><div class="gy" style="font-size:0.72em;padding:4px 0">Loading…</div></div>
</div>

<div class="sec">
  <div class="sec-h"><span>📍 Wallets</span></div>
  <table class="wallet-table">
    <tr><td>SOL Sniper</td><td><div class="addr">4imFZ38DmwD11ohSTEnHHP34Sr6bojMMe21rqhqmgrWf</div></td></tr>
    <tr><td>Polymarket</td><td><div class="addr">0xD1ed2D6f87f03Aa1770cC4A96b8990909602A6da</div></td></tr>
  </table>
</div>

<script>
var DATA_URL = 'https://raw.githubusercontent.com/II187/molduk-dashboard/main/data.json?t=';
var HELIUS = 'https://mainnet.helius-rpc.com/?api-key=ead947f5-2ac4-4f2c-a286-ad48e188b2ad';

function fmtUSD(n) {
  if (!n) return '$0';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'k';
  return '$' + Math.round(n);
}

function timeSince(ts) {
  var s = Math.floor((Date.now()/1000) - ts);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}

// Load from GitHub raw (HTTPS, no CORS issue)
function loadData() {
  fetch(DATA_URL + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d) {
      var now = Date.now();
      var updated = d.updated || 0;
      var lagSec = Math.floor(now/1000 - updated);
      document.getElementById('updated').textContent = 'data: ' + timeSince(updated);
      document.getElementById('updated').style.color = lagSec < 60 ? '#00ff88' : lagSec < 120 ? '#ffaa00' : '#ff4444';

      var positions = d.positions || [];
      var trades = d.recentTrades || [];
      var stats = d.stats || {};

      document.getElementById('pos-cnt').textContent = positions.length;
      document.getElementById('bought').textContent = stats.bought || 0;
      document.getElementById('sold').textContent = stats.sold || 0;
      document.getElementById('pos-time').textContent = new Date().toLocaleTimeString('de-CH');

      // PnL from trades
      var pnl = 0;
      trades.forEach(function(t){ if (t.pnlSol) pnl += parseFloat(t.pnlSol); });
      var pnlEl = document.getElementById('pnl');
      pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(4);
      pnlEl.className = 'stat-val ' + (pnl > 0 ? 'g' : pnl < 0 ? 'r' : 'gy');

      // Positions
      var posEl = document.getElementById('pos-list');
      if (!positions.length) {
        posEl.innerHTML = '<div class="gy" style="font-size:0.72em;padding:8px 0">No open positions</div>';
      } else {
        var h = '';
        var nowSec = now / 1000;
        positions.forEach(function(p) {
          var held = p.buyTime ? Math.floor((now - p.buyTime) / 60000) : 0;
          var pnlPct = p.pnlPct || 0;
          var pc = pnlPct > 5 ? 'g' : pnlPct < -15 ? 'r' : 'y';
          var tpPct = p.tpMcapUsd && p.buyMcapUsd ? Math.round((p.tpMcapUsd/p.buyMcapUsd - 1)*100) : 0;
          h += '<div class="pos">';
          h += '<span class="sym">$' + (p.symbol || '?') + '</span>';
          h += ' <span class="gy" style="font-size:0.7em">' + (p.name || '').slice(0,18) + '</span>';
          h += '<div class="tags">';
          h += '<span class="tag ' + pc + '">' + (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(1) + '%</span>';
          h += '<span class="tag">In: ' + fmtUSD(p.buyMcapUsd) + '</span>';
          if (p.tpMcapUsd) h += '<span class="tag y">TP: ' + fmtUSD(p.tpMcapUsd) + ' (+' + tpPct + '%)</span>';
          h += '<span class="tag b">' + (p.buySol || '?') + ' SOL</span>';
          h += '<span class="tag gy">' + held + 'min</span>';
          h += '</div>';
          // Progress bar to TP
          if (p.tpMcapUsd && p.buyMcapUsd) {
            var prog = Math.min(100, Math.max(0, ((p.pnlPct || 0) / tpPct) * 100));
            h += '<div class="age-bar"><div class="age-fill" style="width:' + prog + '%"></div></div>';
          }
          h += '</div>';
        });
        posEl.innerHTML = h;
      }

      // Trades
      var trEl = document.getElementById('trade-list');
      document.getElementById('trade-cnt').textContent = trades.length + ' total';
      if (!trades.length) {
        trEl.innerHTML = '<div class="gy" style="font-size:0.72em;padding:4px 0">No trades yet</div>';
      } else {
        var h2 = '';
        trades.slice(0,8).forEach(function(t) {
          var isBuy = (t.type || '').toLowerCase() === 'buy';
          var pnlSol = t.pnlSol ? parseFloat(t.pnlSol) : null;
          var hasMoonbag = t.reason && t.reason.indexOf('TP') >= 0;
          h2 += '<div class="pos">';
          h2 += '<span class="' + (isBuy ? 'g' : 'r') + '">' + (isBuy ? '▲ BUY' : '▼ SELL') + '</span>';
          h2 += ' <span class="sym">$' + (t.symbol || '?') + '</span>';
          h2 += '<div class="tags">';
          if (t.buySol) h2 += '<span class="tag">' + t.buySol + ' SOL</span>';
          if (pnlSol !== null && !isBuy) {
            h2 += '<span class="tag ' + (pnlSol >= 0 ? 'g' : 'r') + '">' + (pnlSol >= 0 ? '+' : '') + pnlSol.toFixed(4) + ' SOL</span>';
          }
          if (t.reason) h2 += '<span class="tag ' + (hasMoonbag ? 'mb' : 'y') + '">' + t.reason.slice(0,18) + (hasMoonbag ? ' 🌙' : '') + '</span>';
          h2 += '</div></div>';
        });
        trEl.innerHTML = h2;
      }
    })
    .catch(function(e) {
      document.getElementById('updated').textContent = 'error: ' + e.message.slice(0,30);
    });
}

// SOL balance via Helius
function loadSOL() {
  fetch(HELIUS, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({jsonrpc:'2.0',id:1,method:'getBalance',params:['4imFZ38DmwD11ohSTEnHHP34Sr6bojMMe21rqhqmgrWf']})
  }).then(function(r){ return r.json(); })
    .then(function(d) {
      var sol = (d.result && d.result.value ? d.result.value : 0) / 1e9;
      var el = document.getElementById('sol');
      el.textContent = sol.toFixed(4) + ' SOL';
      el.className = 'hero-sol ' + (sol > 0.5 ? 'g' : sol > 0.1 ? 'y' : 'r');
    }).catch(function(){});
}

// Init
loadData();
loadSOL();
setInterval(function(){ document.getElementById('ts').textContent = new Date().toLocaleTimeString('de-CH'); }, 1000);
setInterval(loadData, 30000);   // every 30s (matches push interval)
setInterval(loadSOL, 15000);    // every 15s
</script>
</body>
</html>
